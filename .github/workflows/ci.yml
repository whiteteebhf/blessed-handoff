name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shellcheck shell files
        run: shellcheck -S warning hooks/*.sh tests/*.sh

  fixtures:
    # The bugs this suite guards against were platform-specific (BSD mktemp
    # semantics, spawned-shell PATH) — run on macOS as well as Linux.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Hook fixture tests
        run: bash tests/run-tests.sh

      - name: Frontmatter and manifest checks
        run: |
          python3 -m pip install --quiet pyyaml
          python3 tests/check-docs.py
